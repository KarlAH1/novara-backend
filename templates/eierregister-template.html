<section class="doc-template" style="font-family: 'Times New Roman', Georgia, serif; font-size: 17px; color: #111827; background: #faf7f2; padding: 36px; border: 1px solid #d9d3c7; border-radius: 16px; line-height: 1.7;">
  <style>
    .doc-template, .doc-template * { color: #000 !important; }
  </style>
  <header style="margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid #d9d3c7;">
    <p style="margin: 0 0 8px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: #6b6255;">Aksjeeierbok</p>
    <h1 style="margin: 0; font-size: 28px; line-height: 1.2;">Aksjeeierbok etter konvertering</h1>
    <p style="margin: 8px 0 0; color: #3f3a31;">Oppdatert oversikt over aksjeeiere og aksjefordeling.</p>
  </header>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 18px;">
    <div><strong>Selskap:</strong> {{company_name}}</div>
    <div style="text-align:right;"><strong>Dato:</strong> {{date}}</div>
    <div><strong>Org.nr.:</strong> {{orgnr}}</div>
  </div>
  <div style="margin-top: 10px; overflow: hidden; border-radius: 12px; border: 1px solid #d9d3c7;">
    <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse; background: #fffdf8;">
      <thead>
        <tr style="background: #f1ece3;">
          <th style="padding: 12px 14px; text-align:left; font-weight: 600;">Aksjeeier</th>
          <th style="padding: 12px 14px; text-align:right; font-weight: 600;">Aksjer</th>
          <th style="padding: 12px 14px; text-align:right; font-weight: 600;">Eierandel</th>
        </tr>
      </thead>
      <tbody>
        {{rows}}
      </tbody>
    </table>
  </div>
  <!-- digital_signature_line -->
</section>
